<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>LEXO — Offline</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #f6fafa; color: #134e4a; font-family: Inter, system-ui, -apple-system, sans-serif; }
      .wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100%; padding: 24px; text-align: center; }
      img { width: 96px; height: 96px; border-radius: 20px; box-shadow: 0 8px 24px rgba(15, 159, 154, 0.18); }
      h1 { font-size: 24px; margin: 24px 0 8px; color: #0f9f9a; }
      p { max-width: 320px; line-height: 1.5; color: #475569; }
      button { margin-top: 24px; min-height: 44px; padding: 12px 24px; border: 0; border-radius: 12px; background: #0f9f9a; color: #fff; font-weight: 700; font-size: 16px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <img src="/4ielts-logo.png" alt="LEXO" />
      <h1>You're offline</h1>
      <p>We couldn't reach the internet. Reconnect and try again — your saved lessons will still be here.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
